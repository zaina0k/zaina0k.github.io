<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Filled rounded-square mark: dark olive background, cream ZA initials -->
  <rect width="100" height="100" rx="16" fill="#2C3A1E"/>
  <!-- Subtle accent border -->
  <rect x="3" y="3" width="94" height="94" rx="13" fill="none" stroke="#8FA05A" stroke-width="2" opacity="0.6"/>
  <!-- ZA initials: cream, bold, centered -->
  <text
    x="50" y="65"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1"
    fill="#F5F0E8"
    text-anchor="middle">ZA</text>
</svg>
